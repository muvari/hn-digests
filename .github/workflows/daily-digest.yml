name: Daily HN Digest

on:
  schedule:
    # 7:43 UTC ≈ 3:43am US Eastern (DST). Cron is UTC and best-effort: GitHub
    # queues scheduled runs and delays of 1-3h are routine, so this is set
    # early (yesterday's front page is final by ~7:00 UTC) and off the :00/:30
    # herd so the digest is reliably ready by morning.
    - cron: "43 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Generate digest with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Generate the daily Hacker News digest inside this repository checkout.
            Follow the skill instructions in ./skill/SKILL.md exactly:
            1. Run: python3 skill/scripts/fetch_hn.py --out /tmp/hn-data
               (no --day argument, so it picks up the previous day's front page;
               use the default story count of 20)
            2. Read each story JSON it produces and write the digest per the
               skill: category badge, 2-4 sentence article summary, and 3-5
               bullets synthesizing the top comment threads, rendered with
               skill/assets/template.html (collapsible cards, collapsed by
               default, {{TOP_N}} = 20).
            3. Save it as digests/hn-digest-<YYYY-MM-DD>.html where the date is
               the front-page day the digest covers (i.e. yesterday's date).
               Overwrite the file if it already exists.
            4. Rebuild the calendar landing page:
               python3 skill/scripts/build_index.py --repo .
            Do NOT run any git commands (no commit, no push) — a later workflow
            step handles git. Success: the digest HTML exists in digests/ with
            20 story cards, and index.html includes the new date.
          claude_args: '--model claude-sonnet-5 --allowedTools "Bash,Read,Write,Edit,Glob,Grep"'

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          DATE=$(ls digests | sed -nE 's/^hn-digest-(.*)\.html$/\1/p' | sort | tail -1)
          git commit -m "Digest for ${DATE}"
          git push
